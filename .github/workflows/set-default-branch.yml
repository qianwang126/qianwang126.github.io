name: Set default branch to test

on:
  push:
    paths:
      - .github/workflows/set-default-branch.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-default:
    runs-on: ubuntu-latest
    steps:
      - name: Set repository default branch
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          curl --fail-with-body \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}" \
            -d '{"default_branch":"test"}'
